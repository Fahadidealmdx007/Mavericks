<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drivers — MAVERICKS | Shop by Driver</title>
  <meta name="description" content="Shop Mavericks F1 driver collections. Verstappen, Leclerc, Norris, Hamilton, Alonso and more." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;900&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:"Montserrat",sans-serif;}
    body{background:#050507;color:#fff;overflow-x:hidden;}
    a{color:inherit;text-decoration:none;}
    nav{position:fixed;top:0;left:0;width:100%;display:flex;justify-content:space-between;align-items:center;padding:18px 48px;z-index:100;background:rgba(5,5,7,0.97);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,0.07);}
    .logo{font-size:22px;font-weight:900;letter-spacing:6px;}
    .nav-links{display:flex;gap:22px;font-size:13px;text-transform:uppercase;letter-spacing:2px;}
    .nav-links a{opacity:0.7;transition:opacity 0.2s;}
    .nav-links a:hover,.nav-links a.active{opacity:1;}
    .nav-links a.active{border-bottom:2px solid #fff;padding-bottom:2px;}

    .page-hero{padding:140px 48px 60px;text-align:center;position:relative;}
    .page-hero::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 30% 50%,rgba(30,65,255,0.1),transparent 55%),radial-gradient(circle at 70% 50%,rgba(255,128,0,0.08),transparent 55%);}
    .page-hero h1{font-size:clamp(44px,8vw,90px);font-weight:900;letter-spacing:12px;position:relative;}
    .page-hero p{margin-top:14px;font-size:14px;letter-spacing:4px;text-transform:uppercase;opacity:0.4;position:relative;}

    .container{max-width:1200px;margin:0 auto;padding:0 24px 100px;}

    .drivers-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-top:20px;}

    .driver-card{
      border-radius:24px;border:1px solid rgba(255,255,255,0.08);
      background:rgba(255,255,255,0.02);overflow:hidden;
      cursor:pointer;transition:transform 0.25s,border-color 0.25s,box-shadow 0.25s;
    }
    .driver-card:hover{transform:translateY(-6px);border-color:var(--dc,rgba(255,255,255,0.25));box-shadow:0 0 24px var(--dg,rgba(255,255,255,0.08));}
    .driver-header{
      height:220px;
      background:linear-gradient(160deg, rgba(0,0,0,0.8), var(--dc-dim,rgba(255,255,255,0.05)));
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      position:relative;overflow:hidden;
    }
    .driver-num-bg{position:absolute;font-size:120px;font-weight:900;opacity:0.08;color:var(--dc,#fff);letter-spacing:-4px;line-height:1;}
    .driver-initials{font-size:44px;font-weight:900;letter-spacing:4px;position:relative;color:var(--dc,#fff);}
    .driver-num-label{font-size:12px;font-weight:700;letter-spacing:3px;opacity:0.5;margin-top:4px;position:relative;}
    .driver-info{padding:20px;}
    .driver-name{font-size:15px;font-weight:900;letter-spacing:2px;}
    .driver-team{font-size:10px;text-transform:uppercase;letter-spacing:3px;opacity:0.4;margin-top:4px;color:var(--dc,inherit);}
    .driver-edition{
      margin-top:10px;display:inline-block;
      padding:3px 10px;border-radius:4px;
      background:var(--dc,rgba(255,255,255,0.1));
      font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
      color:#000;
    }
    .driver-actions{display:flex;gap:8px;margin-top:14px;}
    .btn-driver{flex:1;padding:9px 0;border-radius:999px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:#fff;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;cursor:pointer;font-family:inherit;transition:background 0.2s,border-color 0.2s;}
    .btn-driver:hover{background:var(--dc,rgba(255,255,255,0.1));border-color:var(--dc,rgba(255,255,255,0.4));}
    .btn-driver.primary{background:var(--dc,rgba(255,255,255,0.9));color:#000;border-color:var(--dc,#fff);}
    .btn-driver.primary:hover{opacity:0.85;}

    footer{padding:40px 48px;border-top:1px solid rgba(255,255,255,0.07);display:flex;justify-content:space-between;font-size:12px;opacity:0.35;}
    .reveal{opacity:0;transform:translateY(20px);transition:opacity 0.6s,transform 0.6s;}
    .reveal.visible{opacity:1;transform:translateY(0);}

    @media(max-width:960px){nav{padding:14px 20px;}.nav-links{display:none;}.drivers-grid{grid-template-columns:1fr 1fr;}}
    @media(max-width:500px){.drivers-grid{grid-template-columns:1fr;}.page-hero{padding:120px 20px 40px;}}
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">MAVERICKS</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="teams.html">Teams</a>
      <a href="drivers.html" class="active">Drivers</a>
      <a href="fan-mode.html">Fan Mode</a>
      <a href="race-deals.html">Race Deals</a>
      <a href="about.html">About</a>
    </div>
  </nav>

  <div class="page-hero">
    <h1>DRIVERS</h1>
    <p>Every driver. One collection.</p>
  </div>

  <div class="container">
    <div class="drivers-grid" id="driversGrid"></div>
  </div>

  <footer>
    <span>© <span id="year"></span> Mavericks Studio</span>
    <span>Hotter Than Yesterday</span>
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    const DRIVERS = [
      { name:"Max Verstappen",   num:"33", init:"MV", team:"Red Bull Racing",       color:"#1e41ff", glow:"rgba(30,65,255,0.25)",    edition:"Limited" },
      { name:"Charles Leclerc",  num:"16", init:"CL", team:"Ferrari",               color:"#e8002d", glow:"rgba(232,0,45,0.25)",     edition:"Fan" },
      { name:"Lando Norris",     num:"4",  init:"LN", team:"McLaren",               color:"#ff8000", glow:"rgba(255,128,0,0.25)",    edition:"Premium" },
      { name:"Lewis Hamilton",   num:"44", init:"LH", team:"Mercedes-AMG Petronas", color:"#00d2be", glow:"rgba(0,210,190,0.25)",    edition:"Limited" },
      { name:"Fernando Alonso",  num:"14", init:"FA", team:"Aston Martin",          color:"#006f62", glow:"rgba(0,111,98,0.25)",     edition:"Fan" },
      { name:"George Russell",   num:"63", init:"GR", team:"Mercedes-AMG Petronas", color:"#00d2be", glow:"rgba(0,210,190,0.25)",    edition:"Fan" },
      { name:"Carlos Sainz",     num:"55", init:"CS", team:"Ferrari",               color:"#e8002d", glow:"rgba(232,0,45,0.25)",     edition:"Fan" },
      { name:"Oscar Piastri",    num:"81", init:"OP", team:"McLaren",               color:"#ff8000", glow:"rgba(255,128,0,0.25)",    edition:"Fan" },
    ];

    const grid = document.getElementById("driversGrid");
    grid.innerHTML = DRIVERS.map(d => `
      <div class="driver-card reveal" style="--dc:${d.color};--dg:${d.glow};--dc-dim:${d.color}18">
        <div class="driver-header">
          <div class="driver-num-bg">${d.num}</div>
          <div class="driver-initials">${d.init}</div>
          <div class="driver-num-label">#${d.num}</div>
        </div>
        <div class="driver-info">
          <div class="driver-name">${d.name}</div>
          <div class="driver-team">${d.team}</div>
          <span class="driver-edition">${d.edition}</span>
          <div class="driver-actions">
            <button class="btn-driver primary" onclick="shopDriver('${d.name}','${d.team}')">Shop</button>
            <button class="btn-driver" onclick="setFanDriver('${d.name}','${d.team}')">My Driver</button>
          </div>
        </div>
      </div>
    `).join("");

    function shopDriver(driver, team) {
      localStorage.setItem("mv_fan_driver", driver);
      localStorage.setItem("mv_fan_team", team);
      window.location = "index.html#categories";
    }
    function setFanDriver(driver, team) {
      localStorage.setItem("mv_fan_driver", driver);
      localStorage.setItem("mv_fan_team", team);
      alert("✓ " + driver + " set as your driver! Fan mode activated.");
    }

    const observer = new IntersectionObserver(entries => entries.forEach(e => { if(e.isIntersecting){e.target.classList.add("visible");observer.unobserve(e.target);} }),{threshold:0.1});
    document.querySelectorAll(".reveal").forEach(el => observer.observe(el));
  </script>
</body>
</html>
