server.port=3000

# H2 file-based database (saves to disk like db.json did)
spring.datasource.url=jdbc:h2:file:./mavericksdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=mavericks
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 console (view your database at http://localhost:3000/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Serve static files (index.html, admin.html, css, js)
spring.web.resources.static-locations=classpath:/static/
